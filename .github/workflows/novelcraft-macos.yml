name: NovelCraft macOS Build

on:
  workflow_dispatch:
  push:
    tags:
      - "novelcraft-v*"

jobs:
  build-macos:
    name: NovelCraft macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: x64
          - os: macos-14
            arch: arm64

    defaults:
      run:
        working-directory: desktop/novelcraft

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/novelcraft/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate mac icon (.icns)
        run: bash ./scripts/generate-mac-icon.sh

      - name: Build mac app
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -eo pipefail
          LOG_PATH="${GITHUB_WORKSPACE}/novelcraft-build-${{ matrix.arch }}.log"
          if [[ -n "${CSC_LINK:-}" && -n "${CSC_KEY_PASSWORD:-}" ]]; then
            echo "Signed build enabled."
            export REQUIRE_MAC_NOTARIZATION=1
            npm run build:mac:${{ matrix.arch }} 2>&1 | tee "${LOG_PATH}"
          else
            echo "No signing certificate provided. Building unsigned artifacts."
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            export REQUIRE_MAC_NOTARIZATION=0
            npx electron-builder --mac dmg zip --${{ matrix.arch }} --config.mac.identity=null --config.mac.hardenedRuntime=false 2>&1 | tee "${LOG_PATH}"
          fi

      - name: Verify mac build
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: bash ./scripts/verify-mac-build.sh ${{ matrix.arch }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NovelCraft-build-logs-${{ matrix.arch }}
          path: novelcraft-build-${{ matrix.arch }}.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NovelCraft-macOS-${{ matrix.arch }}
          path: |
            desktop/novelcraft/dist/*-mac-${{ matrix.arch }}.dmg
            desktop/novelcraft/dist/*-mac-${{ matrix.arch }}.zip
            desktop/novelcraft/dist/*-mac-${{ matrix.arch }}.dmg.blockmap
            desktop/novelcraft/dist/*-mac-${{ matrix.arch }}.zip.blockmap
          if-no-files-found: error
          retention-days: 14
